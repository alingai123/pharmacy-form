<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>藥局通路結案申請系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f7ff',
              100: '#daeeff',
              200: '#b3dcff',
              300: '#7cc4ff',
              400: '#3ba4f8',
              500: '#1685e0',
              600: '#0a68be',
              700: '#0b549a',
              800: '#0f477f',
              900: '#123c6a',
            },
            slate: {
              950: '#0c1524',
            }
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Smooth slide-down animation for dynamic sections */
    .slide-section {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .slide-section.open {
      grid-template-rows: 1fr;
      opacity: 1;
    }
    .slide-section > div {
      overflow: hidden;
    }

    /* Custom file input */
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.6;
      cursor: pointer;
    }

    /* Focus ring */
    .field-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(22, 133, 224, 0.18);
    }

    /* Checkbox / Radio custom */
    .custom-check input[type="checkbox"],
    .custom-radio input[type="radio"] {
      accent-color: #1685e0;
      width: 1.1rem;
      height: 1.1rem;
    }

    /* Modal backdrop blur */
    .modal-backdrop {
      backdrop-filter: blur(6px);
    }

    /* Thumbnail hover */
    .thumb-wrap:hover .thumb-delete {
      opacity: 1;
    }
    .thumb-delete {
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Shake animation for validation error */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-5px)}
      40%,80%{transform:translateX(5px)}
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

  <!-- ── Header ── -->
  <header class="bg-brand-700 text-white shadow-md sticky top-0 z-20">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="flex-shrink-0 w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V7l-5-5H5a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
      </div>
      <div>
        <div class="text-xs text-brand-200 tracking-widest uppercase font-medium leading-none mb-0.5">藥局通路</div>
        <div class="text-base font-bold leading-none tracking-tight">結案申請系統</div>
      </div>
    </div>
  </header>

  <!-- ── Main Form ── -->
  <main class="max-w-2xl mx-auto px-4 py-6 pb-24">

    <!-- Section card helper -->
    <!-- ① 基本資料 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-brand-100 text-brand-700 text-xs font-bold flex items-center justify-center flex-shrink-0">1</span>
        <h2 class="font-semibold text-slate-800 text-sm tracking-wide">基本資料</h2>
      </div>

      <div class="px-5 py-5 grid grid-cols-1 sm:grid-cols-2 gap-x-5 gap-y-4">

        <!-- 區域 -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="region">區域</label>
          <select id="region" class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 bg-white focus:border-brand-400 transition-colors">
            <option value="">— 請選擇 —</option>
            <option value="north">北區</option>
            <option value="center">中區</option>
            <option value="south">南區</option>
            <option value="east">東區</option>
          </select>
        </div>

        <!-- 代銷商 -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="distributor">代銷商</label>
          <input id="distributor" type="text" placeholder="請輸入代銷商名稱"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:border-brand-400 transition-colors" />
        </div>

        <!-- 藥局名稱 (必填) -->
        <div class="flex flex-col gap-1 sm:col-span-2">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="pharmacy-name">
            藥局名稱 <span class="text-rose-500">*</span>
          </label>
          <input id="pharmacy-name" type="text" placeholder="請輸入藥局名稱（必填）"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:border-brand-400 transition-colors" />
          <p id="err-pharmacy" class="text-xs text-rose-500 hidden">請填寫藥局名稱</p>
        </div>

        <!-- 地址 -->
        <div class="flex flex-col gap-1 sm:col-span-2">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="address">地址</label>
          <input id="address" type="text" placeholder="請輸入完整地址"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:border-brand-400 transition-colors" />
        </div>

        <!-- 電話 -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="phone">電話</label>
          <input id="phone" type="tel" placeholder="02-XXXX-XXXX"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:border-brand-400 transition-colors" />
        </div>

        <!-- 結案口數 (必填) -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="units">
            結案口數 <span class="text-rose-500">*</span>
          </label>
          <input id="units" type="number" min="1" step="1" placeholder="請輸入整數口數"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 focus:border-brand-400 transition-colors" />
          <p id="err-units" class="text-xs text-rose-500 hidden">請填寫結案口數</p>
        </div>

        <!-- 切口日期 -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="cut-date">切口日期</label>
          <input id="cut-date" type="date"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 focus:border-brand-400 transition-colors" />
        </div>

        <!-- 申請日期 (預設今天) -->
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider" for="apply-date">申請日期</label>
          <input id="apply-date" type="date"
            class="field-input border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 focus:border-brand-400 transition-colors" />
        </div>

      </div>
    </section>

    <!-- ② 申請項目 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-brand-100 text-brand-700 text-xs font-bold flex items-center justify-center flex-shrink-0">2</span>
        <h2 class="font-semibold text-slate-800 text-sm tracking-wide">申請項目 <span class="text-rose-500">*</span></h2>
        <span class="text-xs text-slate-400">（至少選一項）</span>
      </div>

      <div class="px-5 py-5 flex flex-col gap-3">
        <p id="err-items" class="text-xs text-rose-500 hidden">請至少勾選一個申請項目</p>

        <!-- 項目 A -->
        <div class="rounded-xl border border-slate-200 overflow-hidden">
          <label class="custom-check flex items-center gap-3 px-4 py-3.5 cursor-pointer hover:bg-slate-50 transition-colors select-none">
            <input type="checkbox" id="check-a" onchange="toggleA()" />
            <div>
              <span class="font-semibold text-sm text-slate-800">項目 A：後贈 5% 或 6%</span>
              <p class="text-xs text-slate-400 mt-0.5">勾選後請選擇贈回比例</p>
            </div>
          </label>
          <!-- Slide-down: 5% / 6% radio -->
          <div class="slide-section" id="section-a">
            <div>
              <div class="px-5 pt-1 pb-4 bg-brand-50 border-t border-brand-100 flex gap-6">
                <label class="custom-radio flex items-center gap-2 cursor-pointer text-sm text-slate-700">
                  <input type="radio" name="rebate" value="5" />
                  <span class="font-medium">5%</span>
                </label>
                <label class="custom-radio flex items-center gap-2 cursor-pointer text-sm text-slate-700">
                  <input type="radio" name="rebate" value="6" />
                  <span class="font-medium">6%</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- 項目 B -->
        <div class="rounded-xl border border-slate-200 overflow-hidden">
          <label class="custom-check flex items-center gap-3 px-4 py-3.5 cursor-pointer hover:bg-slate-50 transition-colors select-none">
            <input type="checkbox" id="check-b" onchange="toggleB()" />
            <div>
              <span class="font-semibold text-sm text-slate-800">項目 B：贈水</span>
              <p class="text-xs text-slate-400 mt-0.5">勾選後請填寫品項與數量</p>
            </div>
          </label>
          <!-- Slide-down: water detail -->
          <div class="slide-section" id="section-b">
            <div>
              <div class="px-5 pt-2 pb-4 bg-brand-50 border-t border-brand-100">
                <label class="block text-xs font-semibold text-brand-700 mb-1.5" for="water-detail">贈水品項與數量</label>
                <input id="water-detail" type="text" placeholder="如：XX水 5箱"
                  class="w-full field-input border border-brand-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-300 bg-white focus:border-brand-400 transition-colors" />
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- ③ 憑證上傳 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-brand-100 text-brand-700 text-xs font-bold flex items-center justify-center flex-shrink-0">3</span>
        <h2 class="font-semibold text-slate-800 text-sm tracking-wide">
          上傳案憑證 <span class="text-rose-500">*</span>
        </h2>
      </div>

      <div class="px-5 py-5">
        <p class="text-xs text-slate-400 mb-3">出貨或銷貨明細單（可多張）</p>

        <!-- Upload button -->
        <button type="button" onclick="document.getElementById('file-input').click()"
          class="w-full flex flex-col items-center justify-center gap-2 border-2 border-dashed border-brand-200 rounded-2xl py-7 px-4 bg-brand-50 hover:bg-brand-100 hover:border-brand-400 transition-colors cursor-pointer group">
          <div class="w-12 h-12 rounded-full bg-brand-100 group-hover:bg-brand-200 flex items-center justify-center transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </div>
          <span class="text-sm font-semibold text-brand-700">拍照 / 選擇相片</span>
          <span class="text-xs text-slate-400">支援 JPG、PNG、HEIC 格式</span>
        </button>

        <input id="file-input" type="file" accept="image/*" multiple capture="environment" class="hidden" onchange="handleFiles(this)" />

        <p id="err-files" class="text-xs text-rose-500 mt-2 hidden">請至少上傳一張憑證</p>

        <!-- Thumbnail grid -->
        <div id="thumb-grid" class="mt-4 grid grid-cols-3 sm:grid-cols-4 gap-3 hidden"></div>
      </div>
    </section>

  </main>

  <!-- ── Sticky Submit Bar ── -->
  <div class="fixed bottom-0 inset-x-0 z-10 bg-white/90 backdrop-blur border-t border-slate-100 px-4 py-3 safe-bottom">
    <div class="max-w-2xl mx-auto">
      <button id="submit-btn" type="button" onclick="handleSubmit()"
        class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-bold text-base rounded-2xl py-3.5 shadow-lg shadow-brand-200 transition-all duration-150 flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        送出結案申請
      </button>
    </div>
  </div>

  <!-- ── Error Modal ── -->
  <div id="error-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop bg-slate-900/60">
    <div class="bg-white rounded-3xl shadow-2xl mx-5 max-w-sm w-full p-8 flex flex-col items-center text-center">
      <div class="w-16 h-16 rounded-full bg-rose-50 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-900 mb-2">送出失敗</h3>
      <p id="error-msg" class="text-sm text-slate-500 leading-relaxed whitespace-pre-line"></p>
      <button onclick="closeErrorModal()" class="mt-6 w-full bg-rose-500 hover:bg-rose-600 text-white font-semibold rounded-xl py-3 text-sm transition-colors">
        關閉，重新嘗試
      </button>
    </div>
  </div>

  <!-- ── Success Modal ── -->
  <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop bg-slate-900/60">
    <div class="bg-white rounded-3xl shadow-2xl mx-5 max-w-sm w-full p-8 flex flex-col items-center text-center animate-bounce-in">
      <!-- Checkmark -->
      <div class="w-20 h-20 rounded-full bg-emerald-50 flex items-center justify-center mb-5">
        <svg id="check-anim" class="w-10 h-10 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-slate-900 mb-2">申請已送出！</h3>
      <p class="text-sm text-slate-500 leading-relaxed">資料已成功送出，<br/>感謝您的填寫！</p>
      <div class="mt-2 text-xs text-slate-400 bg-slate-50 rounded-xl px-4 py-2">系統將於 1–2 個工作天內完成審核</div>
      <button onclick="closeModal()" class="mt-6 w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl py-3 text-sm transition-colors">
        完成，關閉視窗
      </button>
    </div>
  </div>

  <script>
    // ── Google Apps Script URL ──
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyaRU91IoYsv6_tXBJntUYKtM14Yk_-G_fQpjpJTHYlt4Zh786hDEgE89wlzpZIdJLK/exec';

    // ── Set today's date ──
    (function () {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('apply-date').value = today;
    })();

    // ── Slide toggle helpers ──
    function toggleA() {
      const sec = document.getElementById('section-a');
      const checked = document.getElementById('check-a').checked;
      sec.classList.toggle('open', checked);
      if (!checked) {
        document.querySelectorAll('input[name="rebate"]').forEach(r => r.checked = false);
      }
    }

    function toggleB() {
      const sec = document.getElementById('section-b');
      const checked = document.getElementById('check-b').checked;
      sec.classList.toggle('open', checked);
      if (!checked) {
        document.getElementById('water-detail').value = '';
      }
    }

    // ── File upload & preview ──
    // Store { id, base64 } so we can send to GAS
    const uploadedFiles = [];

    function handleFiles(input) {
      const files = Array.from(input.files);
      files.forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const id = Date.now() + Math.random();
        compressAndRead(file, id);
      });
      input.value = '';
    }

    // Compress image to max 800px wide, quality 0.7 → keeps Base64 small
    function compressAndRead(file, id) {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const base64 = canvas.toDataURL('image/jpeg', 0.7);
        URL.revokeObjectURL(url);
        uploadedFiles.push({ id, base64 });
        addThumb(base64, id);
      };
      img.src = url;
    }

    function addThumb(src, id) {
      const grid = document.getElementById('thumb-grid');
      grid.classList.remove('hidden');

      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap relative aspect-square rounded-xl overflow-hidden bg-slate-100 group';
      wrap.id = 'thumb-' + id;

      const img = document.createElement('img');
      img.src = src;
      img.className = 'w-full h-full object-cover';

      const del = document.createElement('button');
      del.type = 'button';
      del.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>`;
      del.className = 'thumb-delete absolute top-1 right-1 w-6 h-6 rounded-full bg-black/60 text-white flex items-center justify-center hover:bg-rose-500 transition-colors';
      del.onclick = () => removeThumb(id);

      wrap.appendChild(img);
      wrap.appendChild(del);
      grid.appendChild(wrap);
    }

    function removeThumb(id) {
      const el = document.getElementById('thumb-' + id);
      if (el) el.remove();
      const idx = uploadedFiles.findIndex(f => f.id === id);
      if (idx > -1) uploadedFiles.splice(idx, 1);
      if (uploadedFiles.length === 0) {
        document.getElementById('thumb-grid').classList.add('hidden');
      }
    }

    // ── Validation helpers ──
    function showErr(id, show) {
      document.getElementById(id).classList.toggle('hidden', !show);
    }

    function highlightField(id, invalid) {
      const el = document.getElementById(id);
      if (invalid) {
        el.classList.add('border-rose-400', 'bg-rose-50');
        el.classList.remove('border-slate-200');
      } else {
        el.classList.remove('border-rose-400', 'bg-rose-50');
        el.classList.add('border-slate-200');
      }
    }

    // ── Loading state ──
    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      if (on) {
        btn.disabled = true;
        btn.innerHTML = `
          <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          資料上傳中，請稍候…`;
        btn.classList.add('opacity-80', 'cursor-not-allowed');
      } else {
        btn.disabled = false;
        btn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          送出結案申請`;
        btn.classList.remove('opacity-80', 'cursor-not-allowed');
      }
    }

    // ── Error modal ──
    function showErrorModal(msg) {
      document.getElementById('error-msg').textContent = msg;
      const m = document.getElementById('error-modal');
      m.classList.remove('hidden');
      m.classList.add('flex');
    }
    function closeErrorModal() {
      const m = document.getElementById('error-modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    }

    // ── Submit ──
    async function handleSubmit() {
      let valid = true;

      const pharmacy = document.getElementById('pharmacy-name').value.trim();
      const badPharmacy = !pharmacy;
      highlightField('pharmacy-name', badPharmacy);
      showErr('err-pharmacy', badPharmacy);
      if (badPharmacy) valid = false;

      const units = document.getElementById('units').value.trim();
      const badUnits = !units || parseInt(units) < 1 || !Number.isInteger(Number(units));
      highlightField('units', badUnits);
      showErr('err-units', badUnits);
      if (badUnits) valid = false;

      const hasA = document.getElementById('check-a').checked;
      const hasB = document.getElementById('check-b').checked;
      const badItems = !hasA && !hasB;
      showErr('err-items', badItems);
      if (badItems) valid = false;

      const badFiles = uploadedFiles.length === 0;
      showErr('err-files', badFiles);
      if (badFiles) valid = false;

      if (!valid) {
        const firstErr = document.querySelector('.text-rose-500:not(.hidden)');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const btn = document.getElementById('submit-btn');
        btn.classList.add('shake');
        btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
        return;
      }

      // ── Collect data ──
      const rebateRadio = document.querySelector('input[name="rebate"]:checked');
      const payload = {
        region:       document.getElementById('region').value,
        distributor:  document.getElementById('distributor').value.trim(),
        pharmacyName: pharmacy,
        address:      document.getElementById('address').value.trim(),
        phone:        document.getElementById('phone').value.trim(),
        units:        parseInt(units),
        cutDate:      document.getElementById('cut-date').value,
        applyDate:    document.getElementById('apply-date').value,
        rebate:       hasA ? (rebateRadio ? rebateRadio.value + '%' : '未選擇%') : '',
        waterDetail:  hasB ? document.getElementById('water-detail').value.trim() : '',
        fileCount:    uploadedFiles.length,
        // Join all images as JSON array string (each compressed to ~50–80KB)
        files:        JSON.stringify(uploadedFiles.map(f => f.base64))
      };

      // ── Send to Google Apps Script ──
      setLoading(true);
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          // GAS requires no-cors for cross-origin POST from static pages
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        // no-cors → response is opaque, treat reach here as success
        showSuccessModal();
      } catch (err) {
        showErrorModal('網路連線失敗，請確認網路後再試。\n（' + err.message + '）');
      } finally {
        setLoading(false);
      }
    }

    function showSuccessModal() {
      const modal = document.getElementById('success-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('success-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    document.getElementById('success-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('error-modal').addEventListener('click', function(e) {
      if (e.target === this) closeErrorModal();
    });
  </script>
</body>
</html>
